<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Yolevski CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;--s:#fff;--s2:#f8f9fb;--bd:#e4e7ec;
  --t:#0f1724;--t2:#4b5568;--t3:#9aa3b0;
  --bl:#2563eb;--bl2:#eff6ff;--gr:#16a34a;--gr2:#f0fdf4;
  --rd:#dc2626;--rd2:#fef2f2;--am:#d97706;--am2:#fffbeb;
  --pu:#7c3aed;--pu2:#f5f3ff;--nav:#1a2035;--r:6px;
  --f:'Inter',system-ui,sans-serif
}
body{font-family:var(--f);background:var(--bg);color:var(--t);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
.app{display:flex;height:100vh;overflow:hidden}
/* sidebar */
aside{width:210px;min-width:210px;background:var(--nav);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.sb-brand{padding:16px 16px 12px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-name{font-size:14px;font-weight:600;color:#fff;letter-spacing:-.02em}
.sb-sub{font-size:10px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.08em;margin-top:1px}
.sb-sec{padding:14px 16px 4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.25)}
.sb-btn{display:flex;align-items:center;gap:9px;width:100%;padding:7px 16px;background:none;border:none;cursor:pointer;color:rgba(255,255,255,.5);font-family:var(--f);font-size:12.5px;text-align:left;transition:all .1s}
.sb-btn:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.sb-btn.on{background:rgba(255,255,255,.1);color:#fff;font-weight:500}
.sb-counts{padding:12px 16px;border-top:1px solid rgba(255,255,255,.07);margin-top:auto}
.sb-cr{display:flex;justify-content:space-between;padding:2px 0;font-size:11.5px;color:rgba(255,255,255,.35)}
.sb-cr b{color:rgba(255,255,255,.7);font-weight:500}
/* main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.sync-bar{display:none;align-items:center;gap:6px;padding:5px 16px;font-size:11.5px;color:var(--t3);background:var(--s2);border-bottom:1px solid var(--bd);flex-shrink:0}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--bl);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
#view{flex:1;overflow-y:auto;display:flex;flex-direction:column}
/* topbar */
.tb{display:flex;align-items:center;gap:10px;padding:10px 20px;background:var(--s);border-bottom:1px solid var(--bd);flex-shrink:0;position:sticky;top:0;z-index:10}
.tb-title{font-size:15px;font-weight:600;letter-spacing:-.02em;flex:1}
.tb-actions{display:flex;gap:6px;align-items:center}
/* buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--r);border:1px solid var(--bd);background:var(--s);color:var(--t2);font-family:var(--f);font-size:12.5px;font-weight:500;cursor:pointer;transition:all .1s;white-space:nowrap;line-height:1}
.btn:hover{background:var(--s2);border-color:#c9d0da;color:var(--t)}
.btn.sm{padding:4px 9px;font-size:12px}
.btn.pri{background:var(--bl);color:#fff;border-color:var(--bl)}
.btn.pri:hover{background:#1d4ed8;border-color:#1d4ed8}
.btn.ghost{border-color:transparent;background:transparent;color:var(--t3)}
.btn.ghost:hover{background:var(--s2);border-color:var(--bd);color:var(--t2)}
.btn.danger{color:var(--rd);border-color:#fecaca;background:var(--rd2)}
.btn.danger:hover{background:#fee2e2}
.btn.blue{background:var(--bl2);color:var(--bl);border-color:#bfdbfe}
.btn.blue:hover{background:#dbeafe}
.btn:disabled{opacity:.4;cursor:not-allowed}
/* search */
.srch-wrap{position:relative}
.srch-input{padding:6px 10px 6px 30px;border:1px solid var(--bd);border-radius:var(--r);background:var(--s2);font-family:var(--f);font-size:12.5px;color:var(--t);width:220px;outline:none}
.srch-input:focus{border-color:var(--bl);box-shadow:0 0 0 3px rgba(37,99,235,.1);background:var(--s)}
.srch-icon{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none}
/* filter bar */
.fbar{display:flex;align-items:center;gap:6px;padding:8px 20px;background:var(--s);border-bottom:1px solid var(--bd);flex-wrap:wrap;flex-shrink:0}
.chip{padding:3px 10px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--bd);background:var(--s);color:var(--t2);transition:all .1s;user-select:none}
.chip:hover{border-color:var(--bl);color:var(--bl)}
.chip.on{background:var(--bl);color:#fff;border-color:var(--bl)}
.fsel{padding:4px 8px;border:1px solid var(--bd);border-radius:20px;font-size:12px;background:var(--s);color:var(--t2);font-family:var(--f);outline:none;cursor:pointer}
/* table */
.tbl-wrap{overflow-x:auto;background:var(--s)}
table{width:100%;border-collapse:collapse}
th{padding:8px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--bd);background:var(--s2);white-space:nowrap;user-select:none}
th.sortable{cursor:pointer}
td{padding:11px 14px;border-bottom:1px solid var(--bd);vertical-align:middle}
tbody tr.contact-row{cursor:pointer}
tbody tr.contact-row:hover td{background:#f5f7fa}
tbody tr.sel td{background:#eff6ff}
/* pills */
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.p-lead{background:#f3f4f6;color:#374151}
.p-engaged{background:var(--bl2);color:var(--bl)}
.p-hot{background:var(--am2);color:var(--am)}
.p-active{background:var(--gr2);color:var(--gr)}
.p-past{background:#f3f4f6;color:#6b7280}
/* avatar */
.av{width:32px;height:32px;border-radius:50%;background:var(--bl);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
/* tag */
.tag{display:inline-flex;align-items:center;gap:3px;padding:1px 7px;background:var(--s2);border:1px solid var(--bd);border-radius:4px;font-size:11px;color:var(--t2);margin:1px}
.tag-x{cursor:pointer;color:var(--t3);font-size:10px}
.tag-x:hover{color:var(--rd)}
/* stats */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;padding:16px 20px;background:var(--bg);flex-shrink:0}
.stat{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);padding:12px 16px}
.stat-lbl{font-size:11px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}
.stat-val{font-size:24px;font-weight:600;color:var(--t);letter-spacing:-.02em;margin-top:2px}
/* bulk bar */
.bulk-bar{display:flex;align-items:center;gap:8px;padding:8px 20px;background:#fefce8;border-bottom:1px solid #fde047;flex-shrink:0}
/* contact detail */
.dg{display:grid;grid-template-columns:240px 1fr 240px;flex:1;overflow:hidden}
.dl,.dr{overflow-y:auto;background:var(--s)}
.dl{border-right:1px solid var(--bd)}
.dr{border-left:1px solid var(--bd)}
.dc{overflow-y:auto;display:flex;flex-direction:column;background:var(--s)}
.ds{padding:14px 16px;border-bottom:1px solid var(--bd)}
.ds-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:10px}
.dr-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12.5px}
.dr-lbl{color:var(--t3)}
.dr-val{color:var(--t2);text-align:right;max-width:130px;word-break:break-word}
/* tabs */
.tabs{display:flex;border-bottom:1px solid var(--bd);padding:0 16px;background:var(--s);flex-shrink:0}
.tab{padding:9px 12px;font-size:12.5px;cursor:pointer;color:var(--t3);border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--f);transition:all .1s;white-space:nowrap}
.tab:hover{color:var(--t2)}
.tab.on{color:var(--bl);border-bottom-color:var(--bl);font-weight:500}
.tbadge{display:inline-flex;align-items:center;justify-content:center;background:var(--s2);border:1px solid var(--bd);color:var(--t3);font-size:10px;min-width:16px;height:16px;padding:0 4px;border-radius:8px;margin-left:4px}
/* activity */
.act{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd)}
.act:last-child{border-bottom:none}
.act-ico{width:28px;height:28px;border-radius:50%;background:var(--s2);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:1px}
/* qa bar */
.qa{display:flex;align-items:center;gap:6px;padding:10px 16px;border-bottom:1px solid var(--bd);background:var(--s);flex-shrink:0}
/* modals */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--s);border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,.2);width:100%;max-width:500px;max-height:88vh;overflow-y:auto}
.modal.lg{max-width:640px}
.mh{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--s);z-index:1}
.mt{font-size:15px;font-weight:600;letter-spacing:-.01em}
.mb{padding:18px 20px}
.mf{display:flex;justify-content:flex-end;gap:8px;padding:12px 20px;border-top:1px solid var(--bd);background:var(--s2)}
.xbtn{background:none;border:none;font-size:18px;cursor:pointer;color:var(--t3);line-height:1;padding:2px 6px;border-radius:4px}
.xbtn:hover{background:var(--s2)}
/* forms */
.fg{margin-bottom:14px}
.fl{display:block;font-size:11.5px;font-weight:500;color:var(--t2);margin-bottom:5px}
.fi{width:100%;padding:7px 10px;border:1px solid var(--bd);border-radius:var(--r);background:var(--s);font-family:var(--f);font-size:12.5px;color:var(--t);outline:none;transition:border-color .1s}
.fi:focus{border-color:var(--bl);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
textarea.fi{min-height:80px;resize:vertical}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* pipeline */
.pipe{display:flex;gap:12px;padding:16px 20px;overflow-x:auto;flex:1}
.pcol{min-width:200px;width:200px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);display:flex;flex-direction:column;flex-shrink:0}
.pcol-h{padding:10px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.pcol-t{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--t3)}
.pcard{background:var(--s);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px;margin:6px 6px 0;cursor:pointer;transition:all .1s}
.pcard:hover{border-color:var(--bl);box-shadow:0 2px 8px rgba(37,99,235,.1)}
/* inbox */
.trow{border-bottom:1px solid var(--bd)}
.thead2{display:flex;align-items:center;gap:10px;padding:11px 20px;cursor:pointer;transition:background .08s}
.thead2:hover{background:var(--s2)}
.tbody2{display:none;border-top:1px solid var(--bd)}
/* toast */
.toast{position:fixed;bottom:20px;right:20px;background:#111827;color:#fff;padding:10px 16px;border-radius:var(--r);font-size:12.5px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:toastin .15s ease}
@keyframes toastin{from{transform:translateY(6px);opacity:0}to{transform:translateY(0);opacity:1}}
/* misc */
.hidden{display:none!important}
.empty{text-align:center;padding:48px 20px;color:var(--t3)}
.empty h3{font-size:15px;font-weight:600;color:var(--t2);margin-bottom:6px}
.bc{display:flex;align-items:center;gap:6px;font-size:13px}
.bc a{color:var(--t3);cursor:pointer;text-decoration:none}
.bc a:hover{color:var(--bl)}
.ssel{padding:4px 8px;border:1px solid var(--bd);border-radius:var(--r);background:var(--s);font-family:var(--f);font-size:12px;color:var(--t);outline:none;cursor:pointer}
/* mobile */
.ham{display:none;flex-direction:column;justify-content:center;gap:4px;width:32px;height:32px;background:none;border:none;cursor:pointer;padding:5px;flex-shrink:0}
.ham span{display:block;height:1.5px;background:var(--t);border-radius:2px}
.sb-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}
.sb-ov.show{display:block}
.mnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--nav);z-index:98;padding-bottom:env(safe-area-inset-bottom,0)}
.mnb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;background:none;border:none;cursor:pointer;color:rgba(255,255,255,.45);font-family:var(--f);font-size:10px;gap:3px}
.mnb.on{color:#fff}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
@media(max-width:768px){
  .ham{display:flex}
  aside{position:fixed;top:0;left:0;bottom:0;z-index:100;transform:translateX(-100%);transition:transform .25s;box-shadow:4px 0 20px rgba(0,0,0,.15)}
  aside.open{transform:translateX(0)}
  .main{width:100%}
  .dg{grid-template-columns:1fr;height:auto;overflow:visible}
  .dl,.dr{display:none}
  .stats{grid-template-columns:repeat(3,1fr)}
  .overlay{align-items:flex-end}
  .modal{border-radius:12px 12px 0 0;max-height:90vh;max-width:100%}
  .mnav{display:flex}
  #view{padding-bottom:58px}
}
</style>
</head>
<body>
<div class="sb-ov" id="sb-ov" onclick="closeSB()"></div>
<div class="app">
<aside id="sb">
  <div class="sb-brand">

    <div class="sb-sub">CRM</div>

      Inbox
    </button>
    <button class="sb-btn" id="nb-pipeline" onclick="go('pipeline')">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>

    </button>

      Tasks
    </button>
    <button class="sb-btn" id="nb-calendar" onclick="go('calendar')">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Calendar
    </button>
    <div class="sb-sec">Tools</div>
    <button class="sb-btn" onclick="openGmailSetup()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      <span id="gstatus">Connect Gmail</span>
    </button>
    <button class="sb-btn" onclick="openImport()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Import CSV
    </button>
    <button class="sb-btn" onclick="forcePush()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
      Sync to Cloud
    </button>
  </nav>
  <div class="sb-counts" id="sbc"></div>
</aside>
<div class="main">
  <div class="sync-bar" id="syncbar"><span class="sync-dot"></span><span id="syncmsg">Syncing...</span></div>
  <div id="view"></div>
</div>
</div>
<div class="mnav">
  <button class="mnb on" id="mnb-contacts" onclick="go('contacts')">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Contacts</button>
  <button class="mnb" id="mnb-inbox" onclick="go('inbox')">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/></svg>Inbox</button>
  <button class="mnb" id="mnb-tasks" onclick="go('tasks')">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>Tasks</button>
  <button class="mnb" id="mnb-activity" onclick="go('activity')">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Activity</button>
  <button class="mnb" onclick="toggleSB()">

</div>

<script>
'use strict';
// CONFIG
const SB='https://cnhkgjwbvqsojzketlte.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuaGtnandidnFzb2p6a2V0bHRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTg0NjMsImV4cCI6MjA5MDQ3NDQ2M30.kXc6Lu7JTMWTUO57fPLq1ESReGPUuo2sANWvHOgvmXw';
const OWNER='yolevski_alex_2025';
const TRACK='https://yolevski-tracker.broad-queen-33bd.workers.dev';
const SL={lead:'Lead',engaged:'Engaged',hot:'Hot',active:'Active Client',past:'Past Client'};
const SIG='\n\n--\nAlexander Yolevski\nRE/MAX Condos Plus Corp., Brokerage\nMidtown Toronto Condo Specialist\n\u{1F4F1} (416) 887-3386\n\u{1F310} yolevski.com';

// STATE
let CV='contacts', CID=null, SEL=new Set();
let F={stage:'all',tag:'',sort:'created_desc',search:''};
let IC=[];

// UTILS
function uid(){return 'c_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function rel(ts){
  if(!ts) return '—';
  const d=Date.now()-new Date(ts);
  if(d<60000) return 'just now';
  if(d<3600000) return Math.floor(d/60000)+'m ago';
  if(d<86400000) return Math.floor(d/3600000)+'h ago';
  if(d<604800000) return Math.floor(d/86400000)+'d ago';
  return new Date(ts).toLocaleDateString('en-CA',{month:'short',day:'numeric'});
}
function fmt(ts){if(!ts) return ''; return new Date(ts).toLocaleString('en-CA',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}
function ini(c){return ((c.firstName||'?')[0]+(c.lastName||'?')[0]).toUpperCase();}
function pill(s){
  const L={lead:'Lead',engaged:'Engaged',hot:'Hot',active:'Active',past:'Past'};
  const C={lead:'p-lead',engaged:'p-engaged',hot:'p-hot',active:'p-active',past:'p-past'};
  return '<span class="pill '+(C[s]||'p-lead')+'">'+(L[s]||s)+'</span>';
}

function addLog(cid,type,title,text=''){const a=DB.get('activity',[]);a.unshift({id:uid(),contactId:cid,type,title,text,ts:new Date().toISOString()});DB.set('activity',a.slice(0,2000));}
function lastAct(cid){
  const a=DB.get('activity',[]).filter(x=>x.contactId===cid).map(x=>x.ts);
  const e=DB.get('emailstats',[]).filter(x=>x.contactId===cid).flatMap(x=>[x.openedAt,x.clickedAt]).filter(Boolean);
  return [...a,...e].sort().reverse()[0]||null;
}
function timeline(cid){
  const logs=DB.get('activity',[]).filter(a=>a.contactId===cid);
  const ee=[];
  DB.get('emailstats',[]).filter(s=>s.contactId===cid).forEach(s=>{
    if(s.opened&&s.openedAt) ee.push({id:'o'+s.id,type:'email_open',title:'Email opened: "'+esc(s.subject||'')+'"',ts:s.openedAt});
    if(s.clicked&&s.clickedAt) ee.push({id:'c'+s.id,type:'email_click',title:'Link clicked: "'+esc(s.subject||'')+'"',ts:s.clickedAt});
  });
  const ve=DB.get('webvisits',[]).filter(v=>v.contactId===cid&&['pageview','form_submit'].includes(v.eventType)).map(v=>({
    id:v.id,type:v.eventType,title:v.eventType==='form_submit'?'Form submitted':'Visited: '+(v.page||v.url||''),ts:v.ts
  }));
  return [...logs,...ee,...ve].sort((a,b)=>new Date(b.ts)-new Date(a.ts));
}

const DB={

// SUPABASE
async function sb(method,table,body,params=''){
  const r=await fetch(SB+'/rest/v1/'+table+params,{method,
    headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':method==='POST'?'resolution=merge-duplicates,return=minimal':''},
    body:body?JSON.stringify(body):undefined}).catch(()=>null);
  if(!r||r.status===204||r.status===201) return [];
  if(!r.ok) return null;
  return r.json().catch(()=>null);
}
async function _sync(table,items){
  if(!Array.isArray(items)||!items.length) return;
  const rows=items.map(x=>({id:String(x.id||uid()),data:x,owner:OWNER,updated_at:new Date().toISOString()}));
  for(let i=0;i<rows.length;i+=100){await sb('POST',table,rows.slice(i,i+100),'?on_conflict=id');await new Promise(r=>setTimeout(r,10));}
}
function syncShow(m){const b=document.getElementById('syncbar'),e=document.getElementById('syncmsg');if(b)b.style.display='flex';if(e)e.textContent=m;}
function syncHide(){const b=document.getElementById('syncbar');if(b)b.style.display='none';}
async function syncAll(){
  syncShow('Syncing...');
  for(const t of ['contacts','activity','tasks','appts','emailstats']){
    const rows=await sb('GET',t,null,'?select=id,data&owner=eq.'+OWNER+'&order=updated_at.desc&limit=5000');
    if(!rows||!rows.length) continue;
    const items=rows.map(r=>r.data).filter(Boolean);
    if(t==='contacts'){
      const local=DB.get('contacts',[]);const ids=new Set(local.map(c=>c.id));
      const fresh=items.filter(c=>c.id&&!ids.has(c.id));
      if(fresh.length) DB.raw('contacts',[...fresh,...local]);
    } else {
      const local=DB.get(t,[]);if(items.length>=local.length) DB.raw(t,items);
    }
  }
  const te=await sb('GET','tracking_events',null,'?order=ts.desc&limit=1000');
  if(te&&te.length) DB.raw('webvisits',te.map(r=>({id:r.id,contactId:r.contact_id||'',url:r.page_url||'',page:r.page_title||r.page_url||'Page',ts:r.ts,eventType:r.event_type,data:r.data||{}})));
  syncShow('Up to date ✓');setTimeout(syncHide,2000);updateCounts();if(CV==='contacts') renderContacts();
}
async function forcePush(){
  syncShow('Saving...');
  for(const t of ['contacts','activity','tasks','appts','emailstats']){const items=DB.get(t,[]);if(items.length) await _sync(t,items);}
  syncShow('Saved ✓');setTimeout(syncHide,2000);toast('✓ Synced');
}

function filtered(){
  let cs=DB.get('contacts',[]);
  if(F.stage!=='all') cs=cs.filter(c=>c.stage===F.stage);
  if(F.tag) cs=cs.filter(c=>(c.tags||[]).includes(F.tag));
  if(F.search){const q=F.search.toLowerCase();cs=cs.filter(c=>(c.firstName+' '+c.lastName+' '+c.email+' '+(c.tags||[]).join(' ')).toLowerCase().includes(q));}
  return cs.sort((a,b)=>{
    if(F.sort==='name_asc') return (a.firstName+a.lastName).localeCompare(b.firstName+b.lastName);
    if(F.sort==='name_desc') return (b.firstName+b.lastName).localeCompare(a.firstName+a.lastName);
    if(F.sort==='stage'){const o={lead:0,engaged:1,hot:2,active:3,past:4};return(o[a.stage]||0)-(o[b.stage]||0);}
    if(F.sort==='last_act'){const a2=lastAct(a.id)||a.created||'',b2=lastAct(b.id)||b.created||'';return b2.localeCompare(a2);}
    if(F.sort==='oldest') return (a.created||'').localeCompare(b.created||'');
    return (b.created||'').localeCompare(a.created||'');
  });
}

// THE ROW CLICK — one function, no delegation, no tricks
function rowClick(e,id){
  // stop if user clicked a checkbox, button, or tag span
  if(e.target.tagName==='INPUT') return;
  if(e.target.tagName==='BUTTON') return;
  if(e.target.closest('button')) return;
  if(e.target.classList.contains('tag')) return;
  go('contact',id);
}

function sort(col){
  if(col==='name') F.sort=F.sort==='name_asc'?'name_desc':'name_asc';
  else if(col==='created') F.sort=F.sort==='created_desc'?'oldest':'created_desc';
  else if(col==='last_act') F.sort='last_act';
  else F.sort=col;
  renderContacts();
}

// GMAIL OBJECT
const GM={
  get tok(){try{return JSON.parse(localStorage.getItem('ycrm_gt')||'null');}catch{return null;}},
  set tok(v){localStorage.setItem('ycrm_gt',JSON.stringify(v));},
  get cid(){return localStorage.getItem('ycrm_gcid')||'';},
  set cid(v){localStorage.setItem('ycrm_gcid',v);},
  get from(){return localStorage.getItem('ycrm_gfrom')||'';},
  set from(v){localStorage.setItem('ycrm_gfrom',v);},
  ok(){
    const t=this.tok;if(!t||!t.at||!t.exp) return false;
    if(Date.now()>=t.exp){this._sref();return false;}
    if(Date.now()>=t.exp-300000) this._sref();
    return true;
  },
  _sref(){
    if(this._r||!this.cid||!this.from) return;this._r=true;
    const scope='https://www.googleapis.com/auth/gmail.send https://www.googleapis.com/auth/gmail.readonly';
    const redir=location.href.split('?')[0].split('#')[0];
    const fr=document.createElement('iframe');fr.style.display='none';
    fr.src='https://accounts.google.com/o/oauth2/v2/auth?client_id='+encodeURIComponent(this.cid)+'&redirect_uri='+encodeURIComponent(redir)+'&response_type=token&scope='+encodeURIComponent(scope)+'&prompt=none&login_hint='+encodeURIComponent(this.from);
    fr.onload=()=>{try{const h=fr.contentWindow.location.hash;if(h&&h.includes('access_token')){const p=new URLSearchParams(h.slice(1));this.tok={at:p.get('access_token'),exp:Date.now()+parseInt(p.get('expires_in')||'3600')*1000};updGStatus();}}catch{}document.body.removeChild(fr);this._r=false;};
    fr.onerror=()=>{document.body.removeChild(fr);this._r=false;};
    document.body.appendChild(fr);setTimeout(()=>{if(fr.parentNode)document.body.removeChild(fr);this._r=false;},10000);
  },
  async connect(){
    if(!this.cid){openGmailSetup();return false;}
    return new Promise(resolve=>{
      const scope='https://www.googleapis.com/auth/gmail.send https://www.googleapis.com/auth/gmail.readonly';
      const redir=location.href.split('?')[0].split('#')[0];
      const url='https://accounts.google.com/o/oauth2/v2/auth?client_id='+encodeURIComponent(this.cid)+'&redirect_uri='+encodeURIComponent(redir)+'&response_type=token&scope='+encodeURIComponent(scope)+'&prompt=consent';
      const popup=window.open(url,'gauth','width=520,height=620,left=200,top=100');
      const poll=setInterval(()=>{
        try{
          if(!popup||popup.closed){clearInterval(poll);resolve(false);return;}
          const h=popup.location.hash;
          if(h&&h.includes('access_token')){
            clearInterval(poll);const p=new URLSearchParams(h.slice(1));const at=p.get('access_token');
            GM.tok={at,exp:Date.now()+parseInt(p.get('expires_in')||'3600')*1000};popup.close();
            fetch('https://www.googleapis.com/gmail/v1/users/me/profile',{headers:{Authorization:'Bearer '+at}}).then(r=>r.json()).then(d=>{if(d.emailAddress){GM.from=d.emailAddress;}updGStatus();resolve(true);}).catch(()=>{updGStatus();resolve(true);});
          }
        }catch{}
      },300);
    });
  },
  async send({to,subject,body,htmlBody}){
    if(!this.ok()) throw new Error('Not authenticated');
    const b='--b'+uid();
    const raw=['From: '+this.from,'To: '+to,'Subject: '+subject,'MIME-Version: 1.0','Content-Type: multipart/alternative; boundary="'+b+'"','','--'+b,'Content-Type: text/plain; charset=utf-8','',body,'--'+b,'Content-Type: text/html; charset=utf-8','',htmlBody||('<pre style="font-family:sans-serif">'+body+'</pre>'),'--'+b+'--'].join('\r\n');
    const enc=btoa(unescape(encodeURIComponent(raw))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    const r=await fetch('https://www.googleapis.com/gmail/v1/users/me/messages/send',{method:'POST',headers:{Authorization:'Bearer '+this.tok.at,'Content-Type':'application/json'},body:JSON.stringify({raw:enc})});
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||'Send failed');}
  },
  async search(email,max=30){
    if(!this.ok()) return [];
    const q='from:'+email+' OR to:'+email;
    const r=await fetch('https://www.googleapis.com/gmail/v1/users/me/messages?q='+encodeURIComponent(q)+'&maxResults='+max,{headers:{Authorization:'Bearer '+this.tok.at}});
    if(!r.ok) return [];
    const list=await r.json();if(!list.messages?.length) return [];
    const msgs=await Promise.all(list.messages.map(m=>fetch('https://www.googleapis.com/gmail/v1/users/me/messages/'+m.id+'?format=full',{headers:{Authorization:'Bearer '+this.tok.at}}).then(r=>r.json()).catch(()=>null)));
    return msgs.filter(Boolean).map(m=>{
      const hh=m.payload?.headers||[];const h=k=>(hh.find(x=>x.name.toLowerCase()===k)||{value:''}).value;
      let body='';const ext=p=>{if(!p)return;if(p.mimeType==='text/plain'&&p.body?.data){try{body+=atob(p.body.data.replace(/-/g,'+').replace(/_/g,'/')); }catch{}}(p.parts||[]).forEach(ext);};ext(m.payload);
      return{id:m.id,subject:h('subject'),from:h('from'),to:h('to'),date:h('date'),body:body||m.snippet||'',direction:h('from').toLowerCase().includes(GM.from.toLowerCase())?'sent':'received'};
    }).sort((a,b)=>new Date(b.date)-new Date(a.date));
  }
};

async function loadGmail(cid,email){
  const panel=document.getElementById('gp-'+cid);if(!panel)return;
  if(!GM.ok()){panel.innerHTML='<div style="padding:32px;text-align:center;color:var(--t3);font-size:13px"><div style="margin-bottom:10px">Connect Gmail to see email history</div><button class="btn sm pri" onclick="openGmailSetup()">Connect Gmail →</button></div>';return;}
  panel.innerHTML='<div style="padding:32px;text-align:center;color:var(--t3)">Loading…</div>';
  try{
    const emails=await GM.search(email,30);
    if(!emails.length){panel.innerHTML='<div style="padding:32px;text-align:center;color:var(--t3);font-size:13px">No emails found with '+esc(email)+'</div>';return;}
    panel.innerHTML=emails.map((e,i)=>{
      const sent=e.direction==='sent';
      const dt=e.date?new Date(e.date).toLocaleDateString('en-CA',{month:'short',day:'numeric'}):'';
      const prev=(e.body||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim().slice(0,90);

// INBOX
async function renderInbox(){
  const byEmail={};DB.get('contacts',[]).forEach(c=>{if(c.email)byEmail[c.email.toLowerCase()]=c;});
  let h='<div class="tb"><button class="ham" onclick="toggleSB()"><span></span><span></span><span></span></button><div class="tb-title">Inbox</div><div class="tb-actions"><button class="btn sm" onclick="renderInbox()">↻ Refresh</button>'+(GM.ok()?'':'<button class="btn sm pri" onclick="openGmailSetup()">Connect Gmail →</button>')+'</div></div>';
  h+='<div id="inbox-body">'+(GM.ok()?'<div class="empty"><p>Loading conversations\u2026</p></div>':'<div class="empty"><p>Connect Gmail to see lead emails.</p></div>')+'</div>';
  document.getElementById('view').innerHTML=h;
  if(!GM.ok()) return;
  try{
    const emails=Object.keys(byEmail).slice(0,25);if(!emails.length){document.getElementById('inbox-body').innerHTML='<div class="empty"><p>No contacts with emails.</p></div>';return;}
    const q=emails.map(e=>'from:'+e+' OR to:'+e).join(' OR ');
    const r=await fetch('https://www.googleapis.com/gmail/v1/users/me/messages?q='+encodeURIComponent(q)+'&maxResults=100',{headers:{Authorization:'Bearer '+GM.tok.at}});
    if(!r.ok) throw new Error('Gmail API error '+r.status);
    const list=await r.json();
    if(!list.messages?.length){document.getElementById('inbox-body').innerHTML='<div class="empty"><p>No conversations found.</p></div>';return;}
    const msgs=await Promise.all(list.messages.slice(0,100).map(m=>
      fetch('https://www.googleapis.com/gmail/v1/users/me/messages/'+m.id+'?format=metadata&metadataHeaders=From&metadataHeaders=To&metadataHeaders=Subject&metadataHeaders=Date',{headers:{Authorization:'Bearer '+GM.tok.at}}).then(r=>r.json()).catch(()=>null)
    ));
    const tmap={};const myEmail=GM.from.toLowerCase();
    msgs.filter(Boolean).forEach(m=>{
      const hh=m.payload?.headers||[];const h=k=>(hh.find(x=>x.name.toLowerCase()===k)||{value:''}).value;
      const from=h('from'),to=h('to'),subj=h('subject'),date=h('date');
      const fromEmail=(from.match(/<([^>]+)>/)||[,''])[1].toLowerCase()||from.split('<')[0].trim().toLowerCase();
      const toEmails=to.split(',').map(t=>{const m=t.match(/<([^>]+)>/);return m?m[1].toLowerCase():t.trim().toLowerCase();});
      const contact=byEmail[fromEmail]||toEmails.map(e=>byEmail[e]).find(Boolean);if(!contact)return;
      const tid=m.threadId||m.id;const dt=date?new Date(date):new Date(0);
      if(!tmap[tid]||dt>new Date(tmap[tid].date)){tmap[tid]={id:m.id,threadId:tid,subject:subj||'(no subject)',date:dt.toISOString(),snippet:m.snippet||'',contact,unread:m.labelIds?.includes('UNREAD'),isSent:fromEmail===myEmail||from.toLowerCase().includes(myEmail),count:0};}
      tmap[tid].count=(tmap[tid].count||0)+1;
    });
    const threads=Object.values(tmap).sort((a,b)=>new Date(b.date)-new Date(a.date));
    IC=threads;
    let body='<div style="padding:6px 20px;background:var(--s2);border-bottom:1px solid var(--bd);font-size:12px;color:var(--t3)">'+threads.length+' conversations</div>';
    threads.forEach((t,i)=>{
      const c=t.contact;const dt=new Date(t.date);const isToday=dt.toDateString()===new Date().toDateString();
      const ds=isToday?dt.toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'}):dt.toLocaleDateString('en-CA',{month:'short',day:'numeric'});
      const unread=t.unread&&!t.isSent;
      body+='<div class="trow" id="trow-'+i+'">'+
        '<div class="thead2" onclick="openThread('+i+',\''+t.threadId+'\',\''+c.id+'\')">'+
        '<div class="av" style="'+(unread?'background:var(--bl)':'')+'">'+ini(c)+'</div>'+
        '<div style="flex:1;min-width:0">'+
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px">'+
        '<span style="font-weight:'+(unread?'600':'500')+';font-size:13px;color:var(--bl);cursor:pointer;text-decoration:underline" onclick="event.stopPropagation();go(\'contact\',\''+c.id+'\')">'+esc(c.firstName)+' '+esc(c.lastName)+'</span>'+
        '<span style="font-size:11.5px;color:var(--t3)">'+ds+'</span></div>'+
        '<div style="font-size:12.5px;font-weight:'+(unread?'500':'400')+';color:var(--t2);margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(t.subject)+'</div>'+
        '<div style="font-size:12px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(t.snippet)+'</div>'+
        '</div>'+
        '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color:var(--t3);flex-shrink:0;transition:transform .2s" id="tchev-'+i+'"><polyline points="6 9 12 15 18 9"/></svg>'+
        '</div><div class="tbody2" id="tbody-'+i+'"></div></div>';
    });
    document.getElementById('inbox-body').innerHTML=body;
  }catch(e){document.getElementById('inbox-body').innerHTML='<div class="empty"><p>Error: '+esc(e.message)+'</p></div>';}
}

async function openThread(idx,threadId,contactId){
  const body=document.getElementById('tbody-'+idx);const chev=document.getElementById('tchev-'+idx);if(!body)return;
  if(body.style.display==='block'){body.style.display='none';if(chev)chev.style.transform='';return;}
  body.style.display='block';if(chev)chev.style.transform='rotate(180deg)';if(body.innerHTML)return;
  body.innerHTML='<div style="padding:16px;color:var(--t3);font-size:12px">Loading…</div>';
  if(!GM.ok()){body.innerHTML='<div style="padding:16px;font-size:13px;color:var(--t3)">Connect Gmail to view.</div>';return;}
  try{
    const r=await fetch('https://www.googleapis.com/gmail/v1/users/me/threads/'+threadId+'?format=full',{headers:{Authorization:'Bearer '+GM.tok.at}});
    if(!r.ok) throw new Error('Thread failed');const thread=await r.json();const myEmail=GM.from.toLowerCase();
    let h='';
    (thread.messages||[]).forEach((m,i)=>{
      const hh=m.payload?.headers||[];const hdr=k=>(hh.find(x=>x.name.toLowerCase()===k)||{value:''}).value;
      const from=hdr('from'),date=hdr('date');const sent=from.toLowerCase().includes(myEmail);
      const dt=date?new Date(date).toLocaleString('en-CA',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';
      let btext='';const ext=p=>{if(!p)return;if(p.mimeType==='text/plain'&&p.body?.data){try{btext+=atob(p.body.data.replace(/-/g,'+').replace(/_/g,'/')); }catch{}}(p.parts||[]).forEach(ext);};ext(m.payload);if(!btext)btext=m.snippet||'';
      const isLast=i===(thread.messages||[]).length-1;
      h+='<div style="border-bottom:1px solid var(--bd)">'+
        '<div style="display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'">'+
        '<div class="av" style="width:26px;height:26px;font-size:10px;'+(sent?'background:var(--bl)':'')+'">'+(sent?'A':from.charAt(0).toUpperCase())+'</div>'+
        '<div style="flex:1"><div style="font-size:12.5px;font-weight:500">'+esc(sent?'You':from)+'</div><div style="font-size:11px;color:var(--t3)">'+dt+'</div></div></div>'+
        '<div style="display:'+(isLast?'block':'none')+';padding:0 16px 12px 50px;font-size:13px;line-height:1.7;color:var(--t2);white-space:pre-wrap;max-height:280px;overflow-y:auto">'+esc(btext)+'</div></div>';
    });
    h+='<div style="padding:14px 16px;background:var(--s2)">'+
      '<textarea id="reply-'+idx+'" class="fi" style="min-height:72px;font-size:13px;margin-bottom:8px" placeholder="Write a reply\u2026"></textarea>'+
      '<div style="display:flex;justify-content:space-between;align-items:center">'+
      '<span style="font-size:11px;color:var(--t3)">From: '+esc(GM.from)+'</span>'+
      '<button class="btn sm pri" onclick="sendReply('+idx+',\''+contactId+'\',\''+esc((IC[idx]||{}).subject||'')+'\')">Send Reply</button></div></div>';
    body.innerHTML=h;
  }catch(e){body.innerHTML='<div style="padding:16px;color:var(--rd);font-size:13px">'+esc(e.message)+'</div>';}
}

function saveEdit(id){

// CSV IMPORT
function openImport(){
  modal('<div class="mh"><div class="mt">Import CSV</div><button class="xbtn" onclick="closeModal()">✕</button></div>'+
    '<div class="mb"><p style="font-size:13px;color:var(--t2);margin-bottom:14px">Columns: First Name, Last Name, Email, Phone, Stage, Source, Tags (pipe-separated), Notes</p>'+
    '<div class="fg"><label class="fl">CSV File</label><input type="file" id="csv-f" accept=".csv" class="fi"></div>'+
    '<div id="imp-prog" class="hidden" style="margin-top:12px;font-size:12.5px;color:var(--t2)"></div></div>'+
    '<div class="mf"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn sm pri" onclick="runImport()">Import</button></div>');
}
async function runImport(){
  const file=document.getElementById('csv-f')?.files[0];if(!file){toast('Select a CSV');return;}
  const prog=document.getElementById('imp-prog');if(prog)prog.classList.remove('hidden');
  const text=await file.text();const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  if(lines.length<2){toast('CSV is empty');return;}
  const headers=lines[0].split(',').map(h=>h.trim().replace(/^["']/,'').replace(/["']+$/,'').toLowerCase());
  const col=n=>{const a={'first name':'firstname','last name':'lastname'};return headers.findIndex(h=>h===n||h===n.replace(/ /g,'')||a[n]===h||h.includes(n));};
  const fi=col('first name'),li=col('last name'),ei=col('email'),pi=col('phone'),si=col('stage'),sri=col('source'),ti=col('tags'),ni=col('notes');
  const parseRow=raw=>{const p=[];let cur='',inQ=false;for(const ch of raw){if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){p.push(cur);cur='';}else cur+=ch;}p.push(cur);return p;};
  const existing=new Set(DB.get('contacts',[]).map(c=>c.email?.toLowerCase()).filter(Boolean));
  let added=0,skipped=0;const newCs=[...DB.get('contacts',[])];
  for(let i=1;i<lines.length;i++){
    const p=parseRow(lines[i]);const clean=j=>j>=0?(p[j]||'').trim().replace(/^["']/,'').replace(/["']+$/,''):'';
    const email=clean(ei).toLowerCase();if(!email||existing.has(email)){skipped++;continue;}
    existing.add(email);
    newCs.unshift({id:uid(),firstName:clean(fi),lastName:clean(li),email,phone:clean(pi),stage:clean(si)||'lead',source:clean(sri)||'CSV Import',tags:clean(ti)?clean(ti).split('|').map(t=>t.trim()).filter(Boolean):[],notes:clean(ni),created:new Date().toISOString()});
    added++;if(added%50===0&&prog)prog.textContent='Processed '+added+'…';
  }
  DB.raw('contacts',newCs);closeModal();toast('✓ '+added+' imported, '+skipped+' skipped');updateCounts();renderContacts();
  syncShow('Saving '+newCs.length+' to cloud…');_sync('contacts',newCs).then(()=>{syncShow('Saved ✓');setTimeout(syncHide,2000);}).catch(()=>{syncShow('Cloud sync failed — saved locally');setTimeout(syncHide,3000);});
}
