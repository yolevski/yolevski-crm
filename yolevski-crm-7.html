<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yolevski CRM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f3ee;--surface:#fff;--surface2:#f9f8f5;--border:#e2ddd6;--border2:#cdc7bd;
  --text:#1a1916;--text2:#6b6760;--text3:#9e9a93;--accent:#1a1916;--accent-light:#f0ece4;
  --green:#2d6a4f;--green-bg:#e8f5ee;--amber:#92540a;--amber-bg:#fef3dc;
  --blue:#1d4e89;--blue-bg:#e8f0fa;--red:#8b2020;--red-bg:#fdeaea;
  --purple:#4a2080;--purple-bg:#f0eafc;--coral:#8b3320;--coral-bg:#fdeee8;
  --font-serif:'DM Serif Display',serif;--font-sans:'Instrument Sans',sans-serif;--font-mono:'DM Mono',monospace;
  --r:8px;--r-lg:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh;}
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:224px;min-width:224px;background:var(--accent);color:#fff;display:flex;flex-direction:column;overflow-y:auto;}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0;}
.sidebar-brand{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,0.08);}
.sidebar-brand h1{font-family:var(--font-serif);font-size:20px;font-weight:400;color:#fff;}
.sidebar-brand p{font-size:10px;color:rgba(255,255,255,0.35);margin-top:2px;letter-spacing:0.1em;text-transform:uppercase;}
.sidebar-nav{padding:10px 0;flex:1;}
.nav-section{padding:14px 20px 5px;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.28);}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 20px;cursor:pointer;font-size:13px;color:rgba(255,255,255,0.62);transition:all 0.12s;border:none;background:none;width:100%;text-align:left;}
.nav-item:hover{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.9);}
.nav-item.active{background:rgba(255,255,255,0.12);color:#fff;font-weight:500;}
.sidebar-counts{padding:14px 20px;border-top:1px solid rgba(255,255,255,0.08);}
.count-row{display:flex;justify-content:space-between;padding:3px 0;font-size:12px;color:rgba(255,255,255,0.45);}
.count-row strong{color:rgba(255,255,255,0.82);font-weight:500;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 26px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;gap:12px;}
.topbar-title{font-family:var(--font-serif);font-size:21px;font-weight:400;white-space:nowrap;}
.topbar-actions{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font-sans);font-size:13px;cursor:pointer;transition:all 0.12s;white-space:nowrap;line-height:1;}
.btn:hover{background:var(--surface2);border-color:var(--border2);}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-primary:hover{background:#2a2926;border-color:#2a2926;}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-ghost{border-color:transparent;background:transparent;}
.btn-ghost:hover{background:var(--surface2);border-color:var(--border);}
.btn-danger{color:var(--red);border-color:#f5d0d0;background:var(--red-bg);}
.btn-danger:hover{background:#f5d0d0;}
.btn-blue{background:var(--blue-bg);color:var(--blue);border-color:#c5d9f2;}
.btn-blue:hover{background:#d8e8f8;}
.btn:disabled{opacity:0.45;cursor:not-allowed;}
.search-wrap{position:relative;}
.search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;}
.search-input{padding:7px 12px 7px 32px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface2);font-family:var(--font-sans);font-size:13px;color:var(--text);width:210px;outline:none;}
.search-input:focus{border-color:var(--border2);background:var(--surface);}
.content{padding:22px 26px;flex:1;}
.stage-pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;}
.stage-lead{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.stage-engaged{background:var(--blue-bg);color:var(--blue);}
.stage-hot{background:var(--amber-bg);color:var(--amber);}
.stage-active{background:var(--green-bg);color:var(--green);}
.stage-past{background:var(--purple-bg);color:var(--purple);}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead th{padding:10px 14px;text-align:left;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);font-weight:500;background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap;}
thead th:first-child{width:36px;}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--surface2);}
tbody tr.selected{background:#f0f4ff;}
td{padding:11px 14px;font-size:13px;vertical-align:middle;}
.contact-name{font-weight:500;color:var(--text);cursor:pointer;}
.contact-name:hover{text-decoration:underline;text-underline-offset:2px;}
.contact-email{color:var(--text2);font-size:12px;}
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;font-size:11px;background:var(--accent-light);color:var(--text2);border:1px solid var(--border);margin:1px;}
.tag-remove{opacity:0.4;cursor:pointer;font-size:10px;line-height:1;}
.tag-remove:hover{opacity:1;}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0;font-family:var(--font-serif);}
.detail-header{padding:22px 26px;border-bottom:1px solid var(--border);background:var(--surface);}
.detail-name{font-family:var(--font-serif);font-size:22px;font-weight:400;}
.detail-meta{color:var(--text2);font-size:13px;margin-top:2px;}
.activity-item{display:flex;gap:11px;padding:13px 0;border-bottom:1px solid var(--border);}
.activity-item:last-child{border-bottom:none;}
.activity-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:12px;}
.activity-icon.call{background:var(--green-bg);color:var(--green);}
.activity-icon.email{background:var(--blue-bg);color:var(--blue);}
.activity-icon.note{background:var(--amber-bg);color:var(--amber);}
.activity-icon.task{background:var(--purple-bg);color:var(--purple);}
.activity-icon.stage{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.activity-icon.appt{background:var(--coral-bg);color:var(--coral);}
.activity-body{flex:1;min-width:0;}
.activity-title{font-weight:500;font-size:13px;}
.activity-text{color:var(--text2);font-size:12px;margin-top:2px;line-height:1.5;}
.activity-time{font-size:11px;color:var(--text3);margin-top:3px;}
.side-section{padding:18px 20px;border-bottom:1px solid var(--border);}
.side-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);font-weight:500;margin-bottom:10px;}
.field-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid var(--border);font-size:13px;}
.field-row:last-child{border-bottom:none;}
.field-label{color:var(--text2);}
.field-value{font-weight:500;text-align:right;max-width:160px;word-break:break-word;}
.stage-select{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);font-family:var(--font-sans);font-size:13px;color:var(--text);outline:none;cursor:pointer;}
.modal-overlay{position:fixed;inset:0;background:rgba(26,25,22,0.48);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px);}
.modal{background:var(--surface);border-radius:var(--r-lg);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.18);}
.modal-lg{max-width:740px;}
.modal-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1;}
.modal-title{font-family:var(--font-serif);font-size:18px;font-weight:400;}
.modal-body{padding:22px;}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:var(--surface2);border-radius:0 0 var(--r-lg) var(--r-lg);}
.close-btn{background:none;border:none;cursor:pointer;color:var(--text2);padding:4px;border-radius:4px;display:flex;align-items:center;font-size:16px;line-height:1;}
.close-btn:hover{background:var(--surface2);color:var(--text);}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;letter-spacing:0.02em;}
.form-input{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface2);font-family:var(--font-sans);font-size:13px;color:var(--text);outline:none;transition:border-color 0.12s;}
.form-input:focus{border-color:var(--border2);background:var(--surface);}
textarea.form-input{min-height:80px;resize:vertical;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;}
.form-select{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface2);font-family:var(--font-sans);font-size:13px;color:var(--text);outline:none;cursor:pointer;}
.form-select:focus{border-color:var(--border2);}
.stats-row{display:grid;gap:11px;margin-bottom:22px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:15px 17px;}
.stat-label{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);}
.stat-value{font-family:var(--font-serif);font-size:26px;font-weight:400;margin-top:3px;}
.stat-sub{font-size:11px;color:var(--text2);margin-top:1px;}
.filter-bar{display:flex;align-items:center;gap:7px;padding:10px 26px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.filter-chip{padding:4px 10px;border-radius:20px;border:1px solid var(--border);font-size:12px;cursor:pointer;background:var(--surface);color:var(--text2);transition:all 0.1s;white-space:nowrap;user-select:none;}
.filter-chip:hover{border-color:var(--border2);color:var(--text);}
.filter-chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.filter-select{padding:4px 8px;border:1px solid var(--border);border-radius:20px;font-size:12px;background:var(--surface);color:var(--text2);font-family:var(--font-sans);outline:none;cursor:pointer;}
.empty-state{text-align:center;padding:52px 20px;color:var(--text2);}
.empty-state h3{font-family:var(--font-serif);font-size:19px;font-weight:400;color:var(--text);margin-bottom:7px;}
.empty-state p{font-size:13px;max-width:300px;margin:0 auto;}
.breadcrumb{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--text2);}
.breadcrumb a{color:var(--text2);cursor:pointer;}
.breadcrumb a:hover{color:var(--text);}
.bulk-bar{display:flex;align-items:center;gap:8px;padding:10px 26px;background:#f0f4ff;border-bottom:1px solid #c5d9f2;flex-wrap:wrap;}
.bulk-bar-label{font-size:13px;font-weight:500;color:var(--blue);}
.checkbox{width:15px;height:15px;cursor:pointer;accent-color:var(--accent);}
/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);}
.cal-header-cell{background:var(--surface2);padding:8px;text-align:center;font-size:11px;font-weight:500;color:var(--text2);letter-spacing:0.06em;text-transform:uppercase;}
.cal-day{background:var(--surface);min-height:90px;padding:6px;position:relative;}
.cal-day.other-month{background:var(--surface2);}
.cal-day.today{background:#f0f8ff;}
.cal-day-num{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px;}
.cal-day.today .cal-day-num{color:var(--blue);font-weight:600;}
.cal-event{font-size:11px;padding:2px 5px;border-radius:3px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-event.call{background:var(--green-bg);color:var(--green);}
.cal-event.meeting{background:var(--blue-bg);color:var(--blue);}
.cal-event.virtual{background:var(--purple-bg);color:var(--purple);}
/* Pipeline */
.pipeline-board{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;}
.pipeline-col{min-width:200px;width:200px;flex-shrink:0;}
.pipeline-col-header{padding:9px 13px;border-radius:var(--r) var(--r) 0 0;font-size:11px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;}
.pipeline-col-body{background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);min-height:180px;padding:7px;}
.pipeline-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px;margin-bottom:7px;cursor:pointer;transition:all 0.12s;}
.pipeline-card:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,0.05);}
/* Seq */
.seq-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:15px 18px;margin-bottom:11px;cursor:pointer;transition:all 0.12s;}
.seq-card:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,0.04);}
.seq-trigger{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:4px;font-size:11px;background:var(--amber-bg);color:var(--amber);font-weight:500;margin-top:8px;}
.step-editor{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;margin-bottom:9px;}
.day-badge{background:var(--accent);color:#fff;font-size:11px;font-family:var(--font-mono);padding:2px 8px;border-radius:4px;}
/* Report */
.report-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:18px;}
.report-card-header{padding:14px 18px;border-bottom:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:space-between;}
.report-card-title{font-weight:500;font-size:14px;}
.metric-grid{display:grid;gap:11px;}
.metric-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.metric-item:last-child{border-bottom:none;}
.metric-bar-wrap{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.metric-bar{height:100%;border-radius:3px;background:var(--accent);transition:width 0.4s;}
.metric-label{font-size:13px;min-width:140px;}
.metric-val{font-size:12px;color:var(--text2);min-width:40px;text-align:right;}
/* Appt */
.appt-row{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.appt-row:last-child{border-bottom:none;}
.appt-type-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.appt-type-dot.call{background:var(--green);}
.appt-type-dot.meeting{background:var(--blue);}
.appt-type-dot.virtual{background:var(--purple);}
/* Tasks */
.task-row{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid var(--border);}
.task-row:last-child{border-bottom:none;}
.task-check{width:16px;height:16px;flex-shrink:0;margin-top:1px;accent-color:var(--accent);cursor:pointer;}
.task-done .task-title{text-decoration:line-through;color:var(--text3);}
.task-due-overdue{color:var(--red);font-weight:500;}
.task-due-today{color:var(--amber);font-weight:500;}
.task-due-soon{color:var(--blue);}
.priority-badge{display:inline-flex;padding:1px 7px;border-radius:3px;font-size:10px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;}
.priority-high{background:var(--red-bg);color:var(--red);}
.priority-medium{background:var(--amber-bg);color:var(--amber);}
.priority-low{background:var(--surface2);color:var(--text3);border:1px solid var(--border);}
.cal-event.task{background:#f0eafc;color:#4a2080;border-left:2px solid #4a2080;}
/* Contact detail tabs */
.detail-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--surface);padding:0 26px;}
.detail-tab{padding:10px 16px;font-size:13px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:all 0.12s;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font-sans);}
.detail-tab:hover{color:var(--text);}
.detail-tab.active{color:var(--text);border-bottom-color:var(--accent);font-weight:500;}
.detail-tab-badge{display:inline-flex;align-items:center;justify-content:center;background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-size:10px;font-weight:500;min-width:18px;height:16px;padding:0 4px;border-radius:8px;margin-left:5px;}
/* Email thread */
.email-thread-item{border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
.email-thread-header{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;background:var(--surface);transition:background 0.1s;}
.email-thread-header:hover{background:var(--surface2);}
.email-direction-sent{color:var(--blue);font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;background:var(--blue-bg);padding:2px 6px;border-radius:3px;flex-shrink:0;}
.email-direction-recv{color:var(--green);font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;background:var(--green-bg);padding:2px 6px;border-radius:3px;flex-shrink:0;}
.email-thread-subject{font-weight:500;font-size:13px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.email-thread-date{font-size:11px;color:var(--text3);flex-shrink:0;}
.email-thread-body{padding:14px 16px;font-size:13px;line-height:1.7;color:var(--text2);background:var(--surface2);border-top:1px solid var(--border);white-space:pre-wrap;font-family:Georgia,serif;display:none;max-height:400px;overflow-y:auto;}
.email-thread-body.open{display:block;}
/* Web visits */
.visit-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.visit-row:last-child{border-bottom:none;}
.visit-page{font-size:13px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.visit-meta{font-size:11px;color:var(--text3);margin-top:2px;}
.visit-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;margin-top:5px;}
/* Toast */
.toast{position:fixed;bottom:22px;right:22px;background:var(--accent);color:#fff;padding:11px 16px;border-radius:var(--r);font-size:13px;z-index:200;animation:toastIn 0.18s ease;box-shadow:0 4px 16px rgba(0,0,0,0.18);}
@keyframes toastIn{from{transform:translateY(6px);opacity:0}to{transform:translateY(0);opacity:1}}
.ai-spinner{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--text2);}
.dots span{display:inline-block;width:4px;height:4px;border-radius:50%;background:var(--text3);margin:0 1px;animation:dotPulse 1.4s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:0.2s;}
.dots span:nth-child(3){animation-delay:0.4s;}
@keyframes dotPulse{0%,80%,100%{opacity:0.3;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}
.divider{height:1px;background:var(--border);margin:14px 0;}
.hidden{display:none!important;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h1>Yolevski</h1>
      <p>CRM</p>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Leads</div>
      <button class="nav-item active" onclick="showView('contacts')" id="nav-contacts">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>

// ── SUPABASE REST HELPER ─────────────────────────────────────
async function sbReq(method,table,body,params=''){
  const url=`${SB_URL}/rest/v1/${table}${params}`;
  const opts={method,headers:{
    'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,
    'Content-Type':'application/json',
    'Prefer':method==='POST'?'resolution=merge-duplicates':''
  }};
  if(body) opts.body=JSON.stringify(body);
  try{
    const r=await fetch(url,opts);
    if(r.status===204) return [];
    if(!r.ok){console.warn('Supabase',r.status,table);return null;}
    return await r.json();
  }catch(e){console.warn('Supabase offline',e);return null;}
}

// ── DB LAYER — write-through cache ───────────────────────────
// Reads from localStorage (instant), writes to both localStorage + Supabase
const DB={
  get(k,fb=[]){
    try{return JSON.parse(localStorage.getItem('ycrm2_'+k))??fb;}catch{return fb;}
  },
  set(k,v){
    localStorage.setItem('ycrm2_'+k,JSON.stringify(v));
    // Async sync to Supabase — fire and forget
    this._sync(k,v);
  },
  async _sync(table,items){
    if(!Array.isArray(items)||!items.length) return;
    // Upsert in batches of 200
    for(let i=0;i<items.length;i+=200){
      const batch=items.slice(i,i+200).map(item=>({
        id:item.id||uid(),
        data:item,
        updated_at:new Date().toISOString()
      }));
      sbReq('POST',table,batch,'?on_conflict=id').catch(()=>{});
    }
  },
  // Pull latest from Supabase into cache
  async pull(table,fb=[]){
    const rows=await sbReq('GET',table,null,`?select=id,data&order=updated_at.desc&limit=5000`);
    if(!rows) return this.get(table,fb);
    const items=rows.map(r=>r.data);
    localStorage.setItem('ycrm2_'+table,JSON.stringify(items));
    return items;
  }
};

  if(el) el.style.display='none';
  toast('✓ Synced with Supabase');
}

function toggleSelectAll(checked){

function toggleSelect(id,checked){

async function aiBulkDraft(){
  document.getElementById('bulk-ai-loading').classList.remove('hidden');
  const sys=`You are writing a short real estate email for Alexander Yolevski, Midtown Toronto condo specialist. Voice: direct, warm, editorial, neighbourhood-specific, never salesy. Use {{first_name}}. Sign as Alexander. Return JSON only: {"subject":"...","body":"..."}`;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:700,system:sys,messages:[{role:'user',content:'Write a check-in email for Midtown condo leads in the nurture stage.'}]})});
    const d=await r.json();const p=JSON.parse((d.content?.[0]?.text||'{}').replace(/```json|```/g,'').trim());
    if(document.getElementById('bulk-subj'))document.getElementById('bulk-subj').value=p.subject||'';
    if(document.getElementById('bulk-body'))document.getElementById('bulk-body').value=p.body||'';
  }catch(e){toast('AI draft failed');}
  finally{const el=document.getElementById('bulk-ai-loading');if(el)el.classList.add('hidden');}
}

async function sendBulkEmail(){
  const contacts=getContacts().filter(c=>selectedIds.has(c.id));
  const mode=document.getElementById('bulk-mode').value;
  const subj=document.getElementById('bulk-subj').value;
  const body=document.getElementById('bulk-body').value;
  if(!subj){toast('Subject required');return;}

  const sendBtn=document.querySelector('.modal-footer .btn-primary');
  if(sendBtn){sendBtn.disabled=true;sendBtn.textContent='Sending…';}

  if(mode==='bcc'){
    // BCC — one email to all, can't personalise CID per recipient
    const bcc=contacts.map(c=>c.email).filter(Boolean).join(',');
    if(GMAIL.isConnected()){
      try{
        await GMAIL.send({to:GMAIL.fromEmail, bcc, subject:subj, body});
        contacts.forEach(c=>{
          addLog(c.id,'email',`Bulk email sent (BCC): "${subj}"`,body.slice(0,100)+'...');
          const stats=getEmailStats();
          stats.push({id:uid(),contactId:c.id,subject:subj,sentAt:new Date().toISOString(),opened:false,clicked:false});
          saveEmailStats(stats);
        });
        closeModal();toast(`✓ BCC email sent to ${contacts.length} contacts via Gmail`);
      }catch(err){
        if(sendBtn){sendBtn.disabled=false;sendBtn.textContent='Send via Gmail';}
        toast('Send failed: '+err.message);return;
      }
    } else {
      window.open(`mailto:?bcc=${encodeURIComponent(bcc)}&subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body)}`,'_blank');
      contacts.forEach(c=>{
        addLog(c.id,'email',`Bulk email sent: "${subj}"`,body.slice(0,100)+'...');
        const stats=getEmailStats();
        stats.push({id:uid(),contactId:c.id,subject:subj,sentAt:new Date().toISOString(),opened:false,clicked:false});
        saveEmailStats(stats);
      });
      closeModal();toast(`Email opened in Gmail for ${contacts.length} contacts`);
    }
  } else {
    // Individual — personalised per contact with tracked links
    if(GMAIL.isConnected()){
      closeModal();
      let sent=0, failed=0;
      const total=contacts.filter(c=>c.email).length;
      toast(`Sending to ${total} contacts…`);
      for(const c of contacts){
        if(!c.email){failed++;continue;}
        try{
          const personal=injectTrackingLinks(body.replace(/{{first_name}}/g,c.firstName), c.id);
          await GMAIL.send({to:c.email, subject:subj, body:personal});
          addLog(c.id,'email',`Email sent: "${subj}"`,personal.slice(0,100)+'...');
          const stats=getEmailStats();
          stats.push({id:uid(),contactId:c.id,subject:subj,sentAt:new Date().toISOString(),opened:false,clicked:false});
          saveEmailStats(stats);
          sent++;
          // Small delay between sends to avoid rate limiting
          await new Promise(r=>setTimeout(r,300));
        }catch(err){
          failed++;
          addLog(c.id,'email',`Email FAILED: "${subj}"`,err.message);
        }
      }
      toast(`✓ Sent ${sent}${failed?` · ${failed} failed`:''} — links tracked`);
    } else {
      contacts.forEach((c,i)=>{
        setTimeout(()=>{
          const personal=injectTrackingLinks(body.replace(/{{first_name}}/g,c.firstName), c.id);
          window.open(`mailto:${encodeURIComponent(c.email)}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(personal)}`,'_blank');
          addLog(c.id,'email',`Email sent: "${subj}"`,personal.slice(0,100)+'...');
          const stats=getEmailStats();
          stats.push({id:uid(),contactId:c.id,subject:subj,sentAt:new Date().toISOString(),opened:false,clicked:false});
          saveEmailStats(stats);
        },i*400);
      });
      closeModal();toast(`Opened ${contacts.length} Gmail windows`);
    }
  }
  selectedIds.clear();
  if(currentView==='contacts') renderContacts();
}

  const contacts=getContacts();
  contacts.forEach(c=>{if(selectedIds.has(c.id)){if(!c.tags)c.tags=[];if(!c.tags.includes(tag))c.tags.push(tag);}});
  saveContacts(contacts);
  contacts.filter(c=>selectedIds.has(c.id)).forEach(c=>checkTagTriggers(c));
  closeModal();toast(`Tag "${tag}" added to ${selectedIds.size} contacts`);selectedIds.clear();renderContacts();
}

// ── CALENDAR ─────────────────────────────────────────────────
function renderCalendar(){
  const appts=getAppointments();
  const contacts=getContacts();
  const today=new Date();
  const year=calYear,month=calMonth;
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const monthName=new Date(year,month,1).toLocaleString('default',{month:'long'});
  const upcomingAppts=appts.filter(a=>new Date(a.date+'T00:00:00')>=new Date(today.toDateString())).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time)).slice(0,8);

  let calCells='';
  let dayNum=1;
  for(let row=0;row<6;row++){
    if(dayNum>daysInMonth)break;
    for(let col=0;col<7;col++){
      const cellIndex=row*7+col;
      if(cellIndex<firstDay||dayNum>daysInMonth){calCells+=`<div class="cal-day other-month"></div>`;continue;}
      const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
      const isToday=dayNum===today.getDate()&&month===today.getMonth()&&year===today.getFullYear();
      const dayAppts=appts.filter(a=>a.date===dateStr);
      const dayTasks=getTasks().filter(t=>!t.done&&t.dueDate===dateStr);
      calCells+=`<div class="cal-day${isToday?' today':''}">
        <div class="cal-day-num">${dayNum}</div>
        ${dayAppts.map(a=>`<div class="cal-event ${a.type}" onclick="openViewAppt('${a.id}')" title="${a.title}">${a.time} ${a.title}</div>`).join('')}
        ${dayTasks.map(t=>`<div class="cal-event task" onclick="openEditTask('${t.id}')" title="${t.title}">✓ ${t.title}</div>`).join('')}
      </div>`;
      dayNum++;
    }
  }

  document.getElementById('main-content').innerHTML=`
    <div class="topbar">
      <div class="topbar-title">Calendar</div>
      <div class="topbar-actions">
        <button class="btn btn-sm btn-ghost" onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar()">← Prev</button>
        <span style="font-size:14px;font-weight:500;min-width:120px;text-align:center">${monthName} ${year}</span>
        <button class="btn btn-sm btn-ghost" onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar()">Next →</button>
        <button class="btn btn-sm btn-ghost" onclick="calYear=new Date().getFullYear();calMonth=new Date().getMonth();renderCalendar()">Today</button>
        <button class="btn btn-primary btn-sm" onclick="openScheduleAppt(null)">+ Schedule</button>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 280px;height:calc(100vh - 57px);overflow:hidden">
      <div style="overflow-y:auto;padding:20px 24px">
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden">
          <div class="cal-grid">
            ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-header-cell">${d}</div>`).join('')}
            ${calCells}
          </div>
        </div>
        <div style="margin-top:14px;display:flex;gap:12px;font-size:12px;color:var(--text2)">
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--green-bg);border:1px solid var(--green);margin-right:4px"></span>Call</span>
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--blue-bg);border:1px solid var(--blue);margin-right:4px"></span>In-person Meeting</span>
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--purple-bg);border:1px solid var(--purple);margin-right:4px"></span>Virtual</span>
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#f0eafc;border-left:2px solid #4a2080;margin-right:4px"></span>Task due</span>
        </div>
      </div>
      <div style="overflow-y:auto;background:var(--surface2);border-left:1px solid var(--border);padding:18px">
        <div class="side-label">Upcoming</div>
        ${upcomingAppts.length===0?`<div style="font-size:12px;color:var(--text3);padding:8px 0">No upcoming appointments.</div>`:
          upcomingAppts.map(a=>{
            const c=contacts.find(x=>x.id===a.contactId);
            return`<div class="appt-row" style="cursor:pointer" onclick="openViewAppt('${a.id}')">
              <div class="appt-type-dot ${a.type}"></div>
              <div style="flex:1;min-width:0">
                <div style="font-weight:500;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.title}</div>
                <div style="font-size:11px;color:var(--text2)">${fmtDate(a.date)} · ${a.time}</div>
                ${c?`<div style="font-size:11px;color:var(--text3)">${c.firstName} ${c.lastName}</div>`:''}
              </div>
            </div>`;
          }).join('')}
        <div class="divider"></div>
        <div class="side-label">Upcoming Tasks</div>
        ${(()=>{const upcoming=getTasks().filter(t=>!t.done&&t.dueDate&&t.dueDate>=new Date().toISOString().slice(0,10)).sort((a,b)=>a.dueDate.localeCompare(b.dueDate)).slice(0,6);
          if(!upcoming.length)return`<div style="font-size:12px;color:var(--text3)">No upcoming tasks.</div>`;
          return upcoming.map(t=>{const c=contacts.find(x=>x.id===t.contactId);return`<div style="padding:7px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="openEditTask('${t.id}')">
            <div style="display:flex;align-items:center;gap:6px">
              <span class="priority-badge priority-${t.priority||'medium'}" style="flex-shrink:0">${(t.priority||'M')[0].toUpperCase()}</span>
              <span style="font-size:12px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.title}</span>
            </div>
            <div style="font-size:11px;margin-top:2px">${taskDueLabel(t.dueDate,false)}${c?` · <span style="color:var(--text3)">${c.firstName} ${c.lastName}</span>`:''}</div>
          </div>`;}).join('');
        })()}
        <div class="divider"></div>
        <div class="side-label">All Appointments</div>
        <div style="font-size:12px;color:var(--text2)">${appts.length} total</div>
        <button class="btn btn-sm" style="margin-top:10px;width:100%" onclick="openScheduleAppt(null)">+ Schedule New</button>
      </div>
    </div>`;
}

function saveAppt(openGcal=false){
  const contactId=document.getElementById('appt-contact').value;
  const title=document.getElementById('appt-title').value.trim();
  const type=document.getElementById('appt-type').value;
  const date=document.getElementById('appt-date').value;
  const time=document.getElementById('appt-time').value;
  const duration=parseInt(document.getElementById('appt-dur').value);
  const location=document.getElementById('appt-loc').value.trim();
  const notes=document.getElementById('appt-notes').value.trim();
  if(!title||!date||!time){toast('Title, date and time required');return;}
  const appt={id:uid(),contactId,type,title,date,time,duration,location,notes,created:new Date().toISOString()};
  const appts=getAppointments();appts.push(appt);saveAppointments(appts);
  if(contactId)addLog(contactId,'appt',`Appointment: ${title}`,`${fmtDate(date)} at ${time} · ${location||type}`);
  if(openGcal)doAddToGCal(appt);
  closeModal();toast('Appointment saved');
  calYear=parseInt(date.split('-')[0]);calMonth=parseInt(date.split('-')[1])-1;
  if(currentView==='calendar')renderCalendar();
  else if(currentView==='contact-detail'&&currentContactId===contactId)renderContactDetail(contactId);
}

function addToGCal(id){const a=getAppointments().find(x=>x.id===id);if(a)doAddToGCal(a);}
function doAddToGCal(a){
  const start=a.date.replace(/-/g,'')+'T'+a.time.replace(':','')+'00';
  const endMin=a.duration||30;
  const [h,m]=a.time.split(':').map(Number);
  const endDate=new Date(a.date+'T'+a.time);endDate.setMinutes(endDate.getMinutes()+endMin);
  const end=a.date.replace(/-/g,'')+'T'+String(endDate.getHours()).padStart(2,'0')+String(endDate.getMinutes()).padStart(2,'0')+'00';
  const url=`https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(a.title)}&dates=${start}/${end}&details=${encodeURIComponent(a.notes||'')}&location=${encodeURIComponent(a.location||'')}`;
  window.open(url,'_blank');toast('Opening Google Calendar...');
}

let taskFilter='open'; // open | done | all | overdue | today

function taskDueClass(dueDate,done){
  if(done||!dueDate)return'';
  const today=new Date().toISOString().slice(0,10);
  const tomorrow=new Date(Date.now()+864e5).toISOString().slice(0,10);
  if(dueDate<today)return'task-due-overdue';
  if(dueDate===today)return'task-due-today';
  if(dueDate<=tomorrow)return'task-due-soon';
  return'';
}
function taskDueLabel(dueDate,done){
  if(!dueDate)return'';
  const today=new Date().toISOString().slice(0,10);
  const tomorrow=new Date(Date.now()+864e5).toISOString().slice(0,10);
  const cls=taskDueClass(dueDate,done);
  const label=dueDate<today?'Overdue · '+fmtDate(dueDate):dueDate===today?'Due today':dueDate===tomorrow?'Due tomorrow':'Due '+fmtDate(dueDate);
  return cls?`<span class="${cls}">${label}</span>`:`<span style="color:var(--text3)">${label}</span>`;
}

function renderTasks(){
  const allTasks=getTasks();
  const contacts=getContacts();
  const today=new Date().toISOString().slice(0,10);

  const filtered=allTasks.filter(t=>{
    if(taskFilter==='open')return!t.done;
    if(taskFilter==='done')return t.done;
    if(taskFilter==='overdue')return!t.done&&t.dueDate&&t.dueDate<today;
    if(taskFilter==='today')return!t.done&&t.dueDate===today;
    return true;
  }).sort((a,b)=>{
    if(a.done!==b.done)return a.done?1:-1;
    const pd={high:0,medium:1,low:2};
    if(!a.done){
      if(a.dueDate&&b.dueDate)return a.dueDate.localeCompare(b.dueDate);
      if(a.dueDate)return-1;if(b.dueDate)return 1;
    }
    return(pd[a.priority]||1)-(pd[b.priority]||1);
  });

  const open=allTasks.filter(t=>!t.done).length;
  const overdue=allTasks.filter(t=>!t.done&&t.dueDate&&t.dueDate<today).length;
  const dueToday=allTasks.filter(t=>!t.done&&t.dueDate===today).length;
  const done=allTasks.filter(t=>t.done).length;

  document.getElementById('main-content').innerHTML=`
    <div class="topbar">
      <div class="topbar-title">Tasks</div>
      <div class="topbar-actions">
        <button class="btn btn-primary" onclick="openAddTask(null)">+ Add Task</button>
      </div>
    </div>
    <div class="filter-bar">
      ${[['open','Open'],['today','Due Today'],['overdue','Overdue'],['done','Completed'],['all','All']].map(([k,l])=>
        `<div class="filter-chip ${taskFilter===k?'active':''}" onclick="taskFilter='${k}';renderTasks()">${l}</div>`
      ).join('')}
    </div>
    <div class="content">
      <div class="stats-row" style="grid-template-columns:repeat(4,1fr)">
        <div class="stat-card"><div class="stat-label">Open</div><div class="stat-value">${open}</div></div>
        <div class="stat-card"><div class="stat-label">Due Today</div><div class="stat-value" style="color:${dueToday?'var(--amber)':'inherit'}">${dueToday}</div></div>
        <div class="stat-card"><div class="stat-label">Overdue</div><div class="stat-value" style="color:${overdue?'var(--red)':'inherit'}">${overdue}</div></div>
        <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value">${done}</div></div>
      </div>
      ${filtered.length===0?`<div class="empty-state"><h3>No tasks here</h3><p>You're all caught up.</p></div>`:`
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th style="width:32px"></th>
            <th>Task</th><th>Lead</th><th>Priority</th><th>Due Date</th><th></th>
          </tr></thead>
          <tbody>
            ${filtered.map(t=>{
              const c=contacts.find(x=>x.id===t.contactId);
              return`<tr class="${t.done?'task-done':''}">
                <td><input type="checkbox" class="task-check" ${t.done?'checked':''} onchange="toggleTask('${t.id}',this.checked)"></td>
                <td>
                  <div class="task-title" style="font-weight:500;font-size:13px${t.done?';text-decoration:line-through;color:var(--text3)':''}">${t.title}</div>
                  ${t.notes?`<div style="font-size:12px;color:var(--text2);margin-top:2px">${t.notes}</div>`:''}
                </td>
                <td>${c?`<span style="font-size:13px;cursor:pointer;color:var(--blue)" onclick="showView('contact-detail','${c.id}')">${c.firstName} ${c.lastName}</span><br><span style="font-size:11px;color:var(--text3)">${STAGE_LABELS[c.stage]||''}</span>`:`<span style="color:var(--text3);font-size:12px">No contact</span>`}</td>
                <td><span class="priority-badge priority-${t.priority||'medium'}">${t.priority||'medium'}</span></td>
                <td>${t.dueDate?`<div style="font-size:12px">${taskDueLabel(t.dueDate,t.done)}</div>`:`<span style="color:var(--text3);font-size:12px">—</span>`}</td>
                <td style="white-space:nowrap">
                  <button class="btn btn-sm btn-ghost" onclick="openEditTask('${t.id}')">Edit</button>
                  <button class="btn btn-sm btn-danger" onclick="deleteTask('${t.id}')">✕</button>
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`}
    </div>`;
}

function toggleTask(id,done){
  const tasks=getTasks();const t=tasks.find(x=>x.id===id);
  if(!t)return;t.done=done;t.doneAt=done?new Date().toISOString():null;
  saveTasks(tasks);
  if(t.contactId)addLog(t.contactId,'task',done?`Task completed: "${t.title}"`:t.title,'');
  updateSidebarCounts();renderTasks();
}
function deleteTask(id){
  if(!confirm('Delete this task?'))return;
  saveTasks(getTasks().filter(t=>t.id!==id));
  updateSidebarCounts();renderTasks();
}

          <div class="report-card-header"><span class="report-card-title">Pipeline Breakdown</span></div>
          <div style="padding:14px 18px">

              <div class="metric-bar-wrap"><div class="metric-bar" style="width:${Math.round(d.count/maxStage*100)}%"></div></div>
              <div class="metric-val">${d.count}</div>

          <div style="padding:14px 18px">
            ${tagRows.length===0?`<div style="font-size:12px;color:var(--text3)">No tags yet.</div>`:
              tagRows.map(([t,n])=>`<div class="metric-item">
                <div class="metric-label">${t}</div>
                <div class="metric-bar-wrap"><div class="metric-bar" style="width:${Math.round(n/tagRows[0][1]*100)}%;background:var(--blue)"></div></div>
                <div class="metric-val">${n}</div>
              </div>`).join('')}
          </div>
        </div>
      </div>

        <div class="report-card-header">
          <span class="report-card-title">Email Performance by Campaign</span>
          <span style="font-size:12px;color:var(--text3)">Log opens/clicks manually or via Gmail tracking extensions</span>
        </div>
        ${total===0?`<div style="padding:22px;text-align:center;color:var(--text3);font-size:13px">No email stats yet. Send emails or log events manually.</div>`:`
        <table style="width:100%">

// ── GMAIL API ────────────────────────────────────────────────
const GMAIL = {
  // Filled in by user via settings modal
  get clientId(){ return localStorage.getItem('ycrm_gmail_client_id')||''; },
  set clientId(v){ localStorage.setItem('ycrm_gmail_client_id',v); },
  get token(){ try{ return JSON.parse(localStorage.getItem('ycrm_gmail_token')||'null'); }catch{ return null; } },
  set token(v){ localStorage.setItem('ycrm_gmail_token', JSON.stringify(v)); },
  get fromEmail(){ return localStorage.getItem('ycrm_gmail_from')||''; },
  set fromEmail(v){ localStorage.setItem('ycrm_gmail_from',v); },

  isConnected(){
    const t=this.token;
    return !!(t && t.access_token && t.expires_at && Date.now() < t.expires_at);
  },

  async connect(){
    if(!this.clientId){ openGmailSetup(); return false; }
    return new Promise((resolve)=>{
      const scope='https://www.googleapis.com/auth/gmail.send https://www.googleapis.com/auth/gmail.readonly';
      const redirectUri=window.location.href.split('?')[0].split('#')[0];
      const state=Math.random().toString(36).slice(2);
      sessionStorage.setItem('gmail_oauth_state', state);
      sessionStorage.setItem('gmail_oauth_resolve','pending');
      const url=`https://accounts.google.com/o/oauth2/v2/auth`+
        `?client_id=${encodeURIComponent(this.clientId)}`+
        `&redirect_uri=${encodeURIComponent(redirectUri)}`+
        `&response_type=token`+
        `&scope=${encodeURIComponent(scope)}`+
        `&state=${state}`+
        `&prompt=consent`;
      const popup=window.open(url,'gmail_oauth','width=520,height=620,left=200,top=100');
      // Poll for redirect
      const poll=setInterval(()=>{
        try{
          if(!popup||popup.closed){clearInterval(poll);resolve(false);return;}
          const hash=popup.location.hash;
          if(hash&&hash.includes('access_token')){
            clearInterval(poll);
            const params=new URLSearchParams(hash.slice(1));
            const accessToken=params.get('access_token');
            const expiresIn=parseInt(params.get('expires_in')||'3600');
            GMAIL.token={access_token:accessToken, expires_at:Date.now()+expiresIn*1000};
            popup.close();
            // Fetch user email
            fetch('https://www.googleapis.com/gmail/v1/users/me/profile',{
              headers:{Authorization:`Bearer ${accessToken}`}
            }).then(r=>r.json()).then(d=>{
              if(d.emailAddress){ GMAIL.fromEmail=d.emailAddress; }
              resolve(true);
            }).catch(()=>resolve(true));
          }
        }catch(e){ /* cross-origin during redirect — normal */ }
      },300);
    });
  },

  disconnect(){
    localStorage.removeItem('ycrm_gmail_token');
    localStorage.removeItem('ycrm_gmail_from');
    toast('Gmail disconnected');
    updateGmailStatus();
  },

  // Send a plain-text email via Gmail API
  async send({to, subject, body, cc='', bcc=''}){
    if(!this.isConnected()) throw new Error('Not authenticated');
    const from=this.fromEmail;
    // Build RFC 2822 message
    const lines=[
      `From: Alexander Yolevski <${from}>`,
      `To: ${to}`,
    ];
    if(cc) lines.push(`Cc: ${cc}`);
    if(bcc) lines.push(`Bcc: ${bcc}`);
    lines.push(`Subject: ${subject}`);
    lines.push(`Content-Type: text/plain; charset=utf-8`);
    lines.push(`MIME-Version: 1.0`);
    lines.push('');
    lines.push(body);
    const raw=lines.join('\r\n');
    const encoded=btoa(unescape(encodeURIComponent(raw)))
      .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    const res=await fetch('https://www.googleapis.com/gmail/v1/users/me/messages/send',{
      method:'POST',
      headers:{
        Authorization:`Bearer ${this.token.access_token}`,
        'Content-Type':'application/json',
      },
      body:JSON.stringify({raw:encoded})
    });
    if(!res.ok){
      const err=await res.json();
      throw new Error(err.error?.message||`Gmail API error ${res.status}`);
    }
    return await res.json();
  },

  // Search Gmail for emails to/from an address
  async search(email, maxResults=30){
    if(!this.isConnected()) throw new Error('Not authenticated');
    const q=`to:${email} OR from:${email}`;
    const listRes=await fetch(
      `https://www.googleapis.com/gmail/v1/users/me/messages?q=${encodeURIComponent(q)}&maxResults=${maxResults}`,
      {headers:{Authorization:`Bearer ${this.token.access_token}`}}
    );
    if(!listRes.ok) throw new Error('Gmail search failed');
    const list=await listRes.json();
    if(!list.messages?.length) return [];
    // Fetch each message in parallel (up to 20)
    const ids=(list.messages||[]).slice(0,20).map(m=>m.id);
    const msgs=await Promise.all(ids.map(id=>
      fetch(`https://www.googleapis.com/gmail/v1/users/me/messages/${id}?format=full`,
        {headers:{Authorization:`Bearer ${this.token.access_token}`}})
      .then(r=>r.json())
    ));
    return msgs.map(m=>{
      const headers=m.payload?.headers||[];
      const h=k=>headers.find(h=>h.name.toLowerCase()===k.toLowerCase())?.value||'';
      const from=h('From'), toH=h('To'), subject=h('Subject'), date=h('Date');
      const myEmail=GMAIL.fromEmail.toLowerCase();
      const isSent=(from||'').toLowerCase().includes(myEmail);
      // Extract plain text body
      let body='';
      const extractBody=(part)=>{
        if(!part) return;
        if(part.mimeType==='text/plain'&&part.body?.data){
          try{ body+=atob(part.body.data.replace(/-/g,'+').replace(/_/g,'/')); }catch(e){}
        }
        (part.parts||[]).forEach(extractBody);
      };
      extractBody(m.payload);
      if(!body&&m.snippet) body=m.snippet;
      return {
        id:m.id, subject, from, to:toH,
        date:date?new Date(date).toISOString():'',
        body:body.slice(0,3000),
        snippet:m.snippet||'',
        direction:isSent?'sent':'received'
      };
    }).sort((a,b)=>b.date.localeCompare(a.date));
  }
};

// ── TRACKING LINK INJECTION ──────────────────────────────────
const TRACKED_DOMAINS=['yolevski.com','www.yolevski.com','longtable.co','www.longtable.co'];

// Inject ?cid= AND optionally wrap in click redirect
function injectTrackingLinks(body, contactId, emailStatId=''){
  if(!body||!contactId) return body;
  return body.replace(/https?:\/\/[^\s\)\]"'<>]+/g, rawUrl=>{
    try{
      const u=new URL(rawUrl);
      const isTracked=TRACKED_DOMAINS.some(d=>u.hostname===d||u.hostname.endsWith('.'+d));
      if(!isTracked) return rawUrl;
      if(u.searchParams.has('cid')) return rawUrl; // already tagged
      u.searchParams.set('cid', contactId);
      const tagged=u.toString();
      // If worker is configured, wrap in click redirect for precise click event
      if(TRACKER.ready && emailStatId){
        return TRACKER.clickUrl(contactId, emailStatId, tagged);
      }
      return tagged;
    }catch(e){ return rawUrl; }
  });
}

// Append open tracking pixel to email body (plain text — image URL on its own line)
function appendOpenPixel(body, contactId, emailStatId){
  if(!TRACKER.ready||!emailStatId) return body;
  const pixelUrl=TRACKER.pixelUrl(contactId, emailStatId);
  if(!pixelUrl) return body;
  // Plain text emails can't embed images, but some clients render bare image URLs.
  // We add an invisible pixel URL that Gmail will load when the email is opened.
  // For proper HTML email this would be an <img> tag — plain text is a best effort.
  return body + `\n\n\u200B${pixelUrl}\u200B`;
}

async function runFUBImport(){
  document.getElementById('imp-preview').classList.add('hidden');
  document.getElementById('imp-progress').classList.remove('hidden');
  document.querySelector('.modal-footer').innerHTML='<span style="font-size:13px;color:var(--text2)">Importing — please wait…</span>';

  const dupMode=document.querySelector('input[name="dup"]:checked')?.value||'skip';

  function setProgress(pct,msg){
    const bar=document.getElementById('imp-bar');
    const msgEl=document.getElementById('imp-msg');
    if(bar)bar.style.width=pct+'%';
    if(msgEl)msgEl.textContent=msg;
  }

  setProgress(5,'Decompressing contact data…');
  await new Promise(r=>setTimeout(r,30));

  // Decompress the embedded gzip+base64 data
  let fubContacts;
  try{
    const b64=FUB_DATA_B64;
    const bin=atob(b64);
    const bytes=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
    const ds=new DecompressionStream('gzip');
    const writer=ds.writable.getWriter();
    writer.write(bytes);writer.close();
    const reader=ds.readable.getReader();
    const chunks=[];
    while(true){const{done,value}=await reader.read();if(done)break;chunks.push(value);}
    const total=chunks.reduce((a,c)=>a+c.length,0);
    const merged=new Uint8Array(total);
    let off=0;for(const c of chunks){merged.set(c,off);off+=c.length;}
    fubContacts=JSON.parse(new TextDecoder().decode(merged));
  }catch(e){
    toast('Decompression failed: '+e.message);
    closeModal();return;
  }

  setProgress(20,'Preparing contact list…');
  await new Promise(r=>setTimeout(r,30));

  const existing=dupMode==='replace'?[]:getContacts();
  const existingByEmail={};
  existing.forEach(c=>{if(c.email)existingByEmail[c.email.toLowerCase()]=c.id;});
  const existingById={};
  existing.forEach(c=>{if(c.fubId)existingById[c.fubId]=c;});

  const finalContacts=dupMode==='replace'?[...existing]:[...existing];
  const finalById={};
  finalContacts.forEach(c=>finalById[c.id]=c);

  let added=0,updated=0,skipped=0;
  const BATCH=50;

  for(let i=0;i<fubContacts.length;i+=BATCH){
    const batch=fubContacts.slice(i,i+BATCH);
    batch.forEach(fc=>{
      // Assign a fresh uid if none
      const cid=fc.id||uid();
      // Duplicate detection by FUB ID first, then email
      const existByFubId=fc.fubId?existingById[fc.fubId]:null;
      const existByEmail=fc.email?existingByEmail[fc.email.toLowerCase()]:null;
      const existingContact=existByFubId||(existByEmail?finalContacts.find(c=>c.id===existByEmail):null);

      if(existingContact){
        if(dupMode==='skip'){skipped++;return;}
        // overwrite or replace: update fields
        Object.assign(existingContact,{
          firstName:fc.firstName,lastName:fc.lastName,
          email:fc.email,email2:fc.email2,email3:fc.email3,
          phone:fc.phone,phoneType:fc.phoneType,phone2:fc.phone2,
          stage:fc.stage,source:fc.source,assignedTo:fc.assignedTo,
          tags:fc.tags,notes:fc.notes,listingPrice:fc.listingPrice,
          isContacted:fc.isContacted,fubId:fc.fubId,
          fubCalls:fc.fubCalls,fubTexts:fc.fubTexts,
          propertyAddress:fc.propertyAddress,propertyCity:fc.propertyCity,
          propertyPrice:fc.propertyPrice,dealStage:fc.dealStage,
          dealPrice:fc.dealPrice,birthday:fc.birthday,
          closingAnniversary:fc.closingAnniversary,
        });
        updated++;
      } else {
        const newContact={
          id:cid,fubId:fc.fubId,
          firstName:fc.firstName,lastName:fc.lastName,
          email:fc.email||'',email2:fc.email2||'',email3:fc.email3||'',
          phone:fc.phone||'',phoneType:fc.phoneType||'',phone2:fc.phone2||'',
          stage:fc.stage||'lead',source:fc.source||'',assignedTo:fc.assignedTo||'',
          tags:fc.tags||[],notes:fc.notes||'',listingPrice:fc.listingPrice||'',
          isContacted:fc.isContacted||'',
          created:fc.created?fc.created+'T00:00:00.000Z':new Date().toISOString(),
          fubCalls:fc.fubCalls||'',fubTexts:fc.fubTexts||'',
          propertyAddress:fc.propertyAddress||'',propertyCity:fc.propertyCity||'',
          propertyPrice:fc.propertyPrice||'',dealStage:fc.dealStage||'',
          dealPrice:fc.dealPrice||'',birthday:fc.birthday||'',
          closingAnniversary:fc.closingAnniversary||'',
        };
        finalContacts.push(newContact);
        if(fc.email)existingByEmail[fc.email.toLowerCase()]=cid;
        if(fc.fubId)existingById[fc.fubId]=newContact;
        added++;
      }
    });
    const pct=20+Math.round((i/fubContacts.length)*70);
    setProgress(pct,`Importing… ${Math.min(i+BATCH,fubContacts.length).toLocaleString()} of ${fubContacts.length.toLocaleString()}`);
    await new Promise(r=>setTimeout(r,0));
  }

  setProgress(92,'Saving to storage…');
  await new Promise(r=>setTimeout(r,30));
  saveContacts(finalContacts);

  setProgress(100,'Done!');
  await new Promise(r=>setTimeout(r,300));

  closeModal();
  updateSidebarCounts();
  showView('contacts');
  toast(`✓ Imported ${added.toLocaleString()} new · ${updated} updated · ${skipped} skipped`);
}

  if(tab==='emails'){
    // Auto-load if panel is still showing the placeholder
    const panel=document.getElementById('gmail-panel-'+contactId);
    if(panel&&panel.querySelector('div[style*="text-align:center"]')){
      const c=getContacts().find(x=>x.id===contactId);
      if(c&&c.email) loadGmailHistory(contactId, c.email);
    }
  }
}

// ── GMAIL HISTORY ────────────────────────────────────────────
async function loadGmailHistory(contactId, email){
  if(!email){
    document.getElementById('gmail-panel-'+contactId).innerHTML=
      `<div style="padding:24px;text-align:center;color:var(--text3);font-size:13px">No email address on this contact.</div>`;
    return;
  }
  const panel=document.getElementById('gmail-panel-'+contactId);
  if(!panel) return;

  if(!GMAIL.isConnected()){
    panel.innerHTML=`<div style="padding:24px;text-align:center;color:var(--text2);font-size:13px">
      <div style="margin-bottom:12px">Connect Gmail to load email history.</div>
      <button class="btn btn-primary btn-sm" onclick="openGmailSetup()">Connect Gmail →</button>
    </div>`;
    return;
  }

  panel.innerHTML=`<div style="padding:24px;text-align:center"><span class="ai-spinner">Loading Gmail history<span class="dots"><span></span><span></span><span></span></span></span></div>`;

  try{
    const emails=await GMAIL.search(email, 30);
    if(!emails.length){
      panel.innerHTML=`<div style="text-align:center;padding:32px;color:var(--text3);font-size:13px">No emails found with ${email}.</div>`;
      return;
    }
    panel.innerHTML=`
      <div style="font-size:12px;color:var(--text3);margin-bottom:12px">${emails.length} email${emails.length!==1?'s':''} found with ${email}</div>
      ${emails.map((e,i)=>{
        const isSent=e.direction==='sent';
        const dateStr=e.date?new Date(e.date).toLocaleString('en-CA',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'}):'';
        return`<div class="email-thread-item">
          <div class="email-thread-header" onclick="toggleEmailBody('email-body-${i}')">
            <span class="${isSent?'email-direction-sent':'email-direction-recv'}">${isSent?'Sent':'Received'}</span>
            <span class="email-thread-subject">${e.subject||'(no subject)'}</span>
            <span class="email-thread-date">${dateStr}</span>
            <span style="color:var(--text3);font-size:12px;margin-left:6px">▾</span>
          </div>
          <div class="email-thread-body" id="email-body-${i}">
            <div style="font-size:11px;color:var(--text3);margin-bottom:10px">
              From: ${e.from||'—'} · To: ${e.to||'—'}
            </div>
            ${(e.body||e.snippet||'').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
          </div>
        </div>`;
      }).join('')}`;
  }catch(err){
    panel.innerHTML=`<div style="padding:20px;text-align:center;color:var(--red);font-size:13px">
      Failed to load Gmail: ${err.message}<br>
      <button class="btn btn-sm" style="margin-top:10px" onclick="openGmailSetup()">Reconnect Gmail</button>
    </div>`;
  }
}

function toggleEmailBody(id){
  const el=document.getElementById(id);
  if(el) el.classList.toggle('open');
}

// ── WEBSITE TRACKING ─────────────────────────────────────────
function openTrackingSetup(){
  // Generate a unique endpoint key for this CRM instance
  const storageKey='ycrm_trackkey';
  let trackKey=localStorage.getItem(storageKey);
  if(!trackKey){trackKey='yk_'+Math.random().toString(36).slice(2,10);localStorage.setItem(storageKey,trackKey);}

  // The tracking script that goes on the website
  // It reads ?cid= from the URL (set when links are generated from CRM)
  // and pings back to the CRM via a localStorage relay (same-origin only)
  // For cross-origin tracking we use a tiny relay approach via localStorage broadcast
  const trackScript=`<!-- Yolevski CRM Tracking Script -->
<script>
(function(){
  var cid = new URLSearchParams(window.location.search).get('cid');
  if(!cid){ var s=sessionStorage.getItem('ycrm_cid'); if(s)cid=s; }
  if(cid) sessionStorage.setItem('ycrm_cid',cid);
  if(!cid) return;
  var visit={
    cid:cid,
    url:window.location.href,
    page:document.title||window.location.pathname,
    referrer:document.referrer,
    ts:new Date().toISOString(),
    key:'${trackKey}'
  };
  // Broadcast to CRM via BroadcastChannel (works if CRM is open in another tab)
  try{new BroadcastChannel('ycrm_visits').postMessage(visit);}catch(e){}
  // Also store in a shared localStorage key the CRM polls
  try{
    var q=JSON.parse(localStorage.getItem('ycrm_visitqueue')||'[]');
    q.push(visit);if(q.length>200)q=q.slice(-200);
    localStorage.setItem('ycrm_visitqueue',JSON.stringify(q));
  }catch(e){}
})();
<\/script>`;

  // Build tracking link example
  const exampleLink=`https://yolevski.com/?cid=CONTACT_ID`;

  openModal(`
    <div class="modal-header"><div class="modal-title">Website Tracking Setup</div><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div style="padding:10px 12px;background:var(--green-bg);border-radius:var(--r);font-size:12px;color:var(--green);margin-bottom:16px">
        ✓ Two-step setup. Takes about 5 minutes on Squarespace or Wix.
      </div>

      <div style="font-weight:500;margin-bottom:8px">Step 1 — Add tracking script to your website</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:8px">In Squarespace: Settings → Advanced → Code Injection → Header. In Wix: Settings → Custom Code → Head.</div>
      <div style="position:relative">
        <pre style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:12px;font-size:11px;font-family:var(--font-mono);white-space:pre-wrap;overflow-x:auto;line-height:1.6">${trackScript.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>
        <button class="btn btn-sm" style="position:absolute;top:8px;right:8px" onclick="navigator.clipboard.writeText(${JSON.stringify(trackScript)}).then(()=>toast('Copied!'))">Copy</button>
      </div>

      <div class="divider"></div>

      <div style="font-weight:500;margin-bottom:8px">Step 2 — Use tracked links in your emails</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:10px">When emailing a contact, add <code style="background:var(--surface2);padding:1px 5px;border-radius:3px">?cid=THEIR_CRM_ID</code> to any link pointing to your site. The CRM ID is shown on each contact's profile header.</div>
      <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;font-size:12px;font-family:var(--font-mono)">
        https://yolevski.com/midtown-guide?cid=<strong>abc123def</strong>
      </div>

      <div class="divider"></div>

      <div style="font-weight:500;margin-bottom:8px">How it works</div>
      <div style="font-size:12px;color:var(--text2);line-height:1.7">
        When a contact clicks a tracked link and lands on your site, the script captures the page title, URL, referrer, and timestamp. If your CRM is open in another browser tab, the visit appears instantly on their profile. Visits are also queued and synced when you next open the CRM.
      </div>

      <div style="margin-top:12px;padding:10px 12px;background:var(--amber-bg);border-radius:var(--r);font-size:12px;color:var(--amber)">
        <strong>Privacy note:</strong> Anonymous visitors are not tracked. Only contacts who click a CRM-tracked link are identified.
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Close</button>
      <button class="btn btn-primary" onclick="navigator.clipboard.writeText(${JSON.stringify(trackScript)}).then(()=>toast('Script copied to clipboard!'))">Copy Script</button>
    </div>`,true);
}

// Poll the visit queue set by the tracking script
function pollVisitQueue(){
  try{
    const storageKey='ycrm_trackkey';
    const trackKey=localStorage.getItem(storageKey);
    if(!trackKey) return;
    const raw=localStorage.getItem('ycrm_visitqueue');
    if(!raw) return;
    const queue=JSON.parse(raw);
    if(!queue.length) return;
    // Only process visits for our key
    const mine=queue.filter(v=>v.key===trackKey);
    if(!mine.length) return;
    // Remove processed visits from queue
    const remaining=queue.filter(v=>v.key!==trackKey);
    localStorage.setItem('ycrm_visitqueue',JSON.stringify(remaining));
    // Match CID to contact
    const contacts=getContacts();
    const visits=getWebVisits();
    let added=0;
    mine.forEach(v=>{
      const c=contacts.find(x=>x.id===v.cid||x.fubId===v.cid);
      if(!c) return;
      visits.unshift({id:uid(),contactId:c.id,url:v.url,page:v.page,referrer:v.referrer,ts:v.ts});
      added++;
    });
    if(added){
      saveWebVisits(visits.slice(0,2000));
      updateSidebarCounts();
      if(currentView==='contact-detail') renderContactDetail(currentContactId);
    }
  }catch(e){}
}

// Listen for real-time visits via BroadcastChannel
(function(){
  try{
    const bc=new BroadcastChannel('ycrm_visits');
    bc.onmessage=e=>{
      const v=e.data;
      const trackKey=localStorage.getItem('ycrm_trackkey');
      if(!v||v.key!==trackKey) return;
      const contacts=getContacts();
      const c=contacts.find(x=>x.id===v.cid||x.fubId===v.cid);
      if(!c) return;
      const visits=getWebVisits();
      visits.unshift({id:uid(),contactId:c.id,url:v.url,page:v.page,referrer:v.referrer,ts:v.ts});
      saveWebVisits(visits.slice(0,2000));
      updateSidebarCounts();
      toast(`🌐 ${c.firstName} ${c.lastName} just visited your site`);
      if(currentView==='contact-detail'&&currentContactId===c.id) renderContactDetail(c.id);
    };
  }catch(e){}
})();

// Poll every 30s for queued visits
setInterval(pollVisitQueue,30000);

// ── TAG TRIGGER ENGINE ────────────────────────────────────────
function checkTagTriggers(contact){
  const seqs=getSequences();const tags=contact.tags||[];
  seqs.forEach(seq=>{
    if(seq.triggerType==='tag'&&seq.triggerValue&&tags.includes(seq.triggerValue)){
      const already=getEnrollments().find(e=>e.contactId===contact.id&&e.sequenceId===seq.id&&e.status==='active');
      if(!already){
        const enrollments=getEnrollments();
        enrollments.push({id:uid(),contactId:contact.id,sequenceId:seq.id,status:'active',currentStep:0,startedAt:new Date().toISOString()});
        saveEnrollments(enrollments);
        addLog(contact.id,'email',`Auto-enrolled in "${seq.name}"`,'Triggered by tag.');
      }
    }
  });
}
